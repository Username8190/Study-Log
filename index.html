<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Tracker - 学習記録アプリ</title>
  
  <!-- ライブラリの読み込み -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* カスタムスクロールバー等 */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- 設定データ ---
    const SUBJECT_COLORS = {
      '英語': '#ec4899', // Pink
      '数学': '#3b82f6', // Blue
      '理科': '#22c55e', // Green
      '社会': '#f97316', // Orange
      '国語': '#a855f7', // Purple
      'その他': '#9ca3af' // Gray
    };
    const SUBJECTS = Object.keys(SUBJECT_COLORS);

    // 古いデータを読み込まないよう、保存キーを新しくしています ("_v2" を付与)
    const STORAGE_KEYS = {
      MATERIALS: 'study_materials_v2',
      RECORDS: 'study_records_v2'
    };

    // --- アイコンコンポーネント ---
    const Icon = ({ name, size = 24, className = '' }) => {
      const iconRef = useRef(null);
      useEffect(() => {
        if (iconRef.current) {
          lucide.createIcons({
            root: iconRef.current.parentElement,
            icons: { [name]: lucide.icons[name] }
          });
        }
      }, [name]);
      return <i ref={iconRef} data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
    };

    // --- メインアプリケーション ---
    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      
      // データステート (初期値は完全に空の配列)
      const [materials, setMaterials] = useState(() => {
        const saved = localStorage.getItem(STORAGE_KEYS.MATERIALS);
        return saved ? JSON.parse(saved) : [];
      });
      const [records, setRecords] = useState(() => {
        const saved = localStorage.getItem(STORAGE_KEYS.RECORDS);
        return saved ? JSON.parse(saved) : [];
      });

      // データの保存
      useEffect(() => {
        localStorage.setItem(STORAGE_KEYS.MATERIALS, JSON.stringify(materials));
      }, [materials]);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEYS.RECORDS, JSON.stringify(records));
      }, [records]);

      // レコード追加関数
      const addRecord = (materialId, durationSeconds) => {
        const newRecord = {
          id: Date.now().toString(),
          materialId,
          durationSeconds,
          date: new Date().toISOString()
        };
        setRecords([newRecord, ...records]);
      };

      return (
        <div className="flex flex-col md:flex-row min-h-screen">
          {/* サイドバー / ボトムナビゲーション */}
          <nav className="bg-white border-r md:w-64 flex-shrink-0 flex md:flex-col justify-around md:justify-start p-4 border-b md:border-b-0 sticky top-0 md:h-screen z-10 shadow-sm md:shadow-none">
            <div className="hidden md:flex items-center gap-2 mb-8 px-2 text-indigo-600">
              <Icon name="book-open" size={28} />
              <h1 className="text-xl font-bold tracking-tight">Study Tracker</h1>
            </div>

            {[
              { id: 'dashboard', icon: 'layout-dashboard', label: 'ダッシュボード' },
              { id: 'timer', icon: 'timer', label: 'タイマー' },
              { id: 'materials', icon: 'library', label: '教材管理' },
              { id: 'records', icon: 'history', label: '学習履歴' }
            ].map(tab => (
              <button
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                className={`flex flex-col md:flex-row items-center gap-1 md:gap-3 p-2 md:p-3 rounded-xl transition-colors ${
                  activeTab === tab.id 
                    ? 'bg-indigo-50 text-indigo-600 font-semibold' 
                    : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'
                }`}
              >
                <Icon name={tab.icon} size={20} />
                <span className="text-xs md:text-sm">{tab.label}</span>
              </button>
            ))}
          </nav>

          {/* メインコンテンツ */}
          <main className="flex-1 p-4 md:p-8 max-w-5xl mx-auto w-full">
            {activeTab === 'dashboard' && <Dashboard materials={materials} records={records} />}
            {activeTab === 'timer' && <Timer materials={materials} addRecord={addRecord} />}
            {activeTab === 'materials' && <MaterialsManager materials={materials} setMaterials={setMaterials} />}
            {activeTab === 'records' && <RecordsList records={records} materials={materials} setRecords={setRecords} />}
          </main>
        </div>
      );
    }

    // --- ダッシュボードコンポーネント ---
    function Dashboard({ materials, records }) {
      const today = new Date().toISOString().split('T')[0];
      
      const stats = useMemo(() => {
        let todaySeconds = 0;
        let totalSeconds = 0;
        const subjectSeconds = {};

        records.forEach(record => {
          totalSeconds += record.durationSeconds;
          
          const recordDate = record.date.split('T')[0];
          if (recordDate === today) {
            todaySeconds += record.durationSeconds;
          }

          const material = materials.find(m => m.id === record.materialId);
          const subject = material ? material.subject : 'その他';
          subjectSeconds[subject] = (subjectSeconds[subject] || 0) + record.durationSeconds;
        });

        return { todaySeconds, totalSeconds, subjectSeconds };
      }, [records, materials, today]);

      const formatHours = (seconds) => (seconds / 3600).toFixed(1);

      return (
        <div className="space-y-6 animate-in fade-in duration-300">
          <h2 className="text-2xl font-bold text-slate-800">ダッシュボード</h2>
          
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
              <div className="bg-indigo-100 p-4 rounded-full text-indigo-600">
                <Icon name="sun" size={32} />
              </div>
              <div>
                <p className="text-sm text-slate-500 font-medium">今日の学習時間</p>
                <p className="text-3xl font-bold text-slate-800">{formatHours(stats.todaySeconds)} <span className="text-base font-normal text-slate-500">時間</span></p>
              </div>
            </div>
            
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
              <div className="bg-emerald-100 p-4 rounded-full text-emerald-600">
                <Icon name="award" size={32} />
              </div>
              <div>
                <p className="text-sm text-slate-500 font-medium">累計学習時間</p>
                <p className="text-3xl font-bold text-slate-800">{formatHours(stats.totalSeconds)} <span className="text-base font-normal text-slate-500">時間</span></p>
              </div>
            </div>
          </div>

          <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h3 className="text-lg font-bold text-slate-800 mb-4">教科別の学習比率</h3>
            {Object.keys(stats.subjectSeconds).length === 0 ? (
              <p className="text-slate-400 text-center py-8">まだ学習記録がありません。タイマーで記録をつけましょう！</p>
            ) : (
              <div className="space-y-4">
                {Object.entries(stats.subjectSeconds)
                  .sort(([, a], [, b]) => b - a)
                  .map(([subject, seconds]) => {
                    const percentage = (seconds / stats.totalSeconds) * 100;
                    return (
                      <div key={subject}>
                        <div className="flex justify-between text-sm mb-1">
                          <span className="font-medium text-slate-700">{subject}</span>
                          <span className="text-slate-500">{formatHours(seconds)}時間 ({percentage.toFixed(0)}%)</span>
                        </div>
                        <div className="w-full bg-slate-100 rounded-full h-2.5">
                          <div 
                            className="h-2.5 rounded-full" 
                            style={{ 
                              width: `${percentage}%`,
                              backgroundColor: SUBJECT_COLORS[subject] || SUBJECT_COLORS['その他']
                            }}
                          ></div>
                        </div>
                      </div>
                    );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- タイマーコンポーネント ---
    function Timer({ materials, addRecord }) {
      const [time, setTime] = useState(0);
      const [isRunning, setIsRunning] = useState(false);
      const [selectedMaterialId, setSelectedMaterialId] = useState('');
      const intervalRef = useRef(null);

      useEffect(() => {
        if (isRunning) {
          intervalRef.current = setInterval(() => {
            setTime(t => t + 1);
          }, 1000);
        } else {
          clearInterval(intervalRef.current);
        }
        return () => clearInterval(intervalRef.current);
      }, [isRunning]);

      const handleStartPause = () => {
        if (!selectedMaterialId) {
          alert("先に教材を選択してください。");
          return;
        }
        setIsRunning(!isRunning);
      };

      const handleStop = () => {
        setIsRunning(false);
        if (time > 60) { // 1分以上なら記録
          addRecord(selectedMaterialId, time);
          alert("学習記録を保存しました！お疲れ様です。");
        } else if (time > 0) {
          alert("1分未満のため記録されませんでした。");
        }
        setTime(0);
      };

      const formatTime = (totalSeconds) => {
        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      };

      return (
        <div className="max-w-xl mx-auto space-y-8 animate-in fade-in duration-300">
          <div className="text-center space-y-2">
            <h2 className="text-2xl font-bold text-slate-800">学習タイマー</h2>
            <p className="text-slate-500">集中して学習に取り組みましょう</p>
          </div>

          <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 text-center">
            {materials.length === 0 ? (
              <div className="py-8 text-amber-600 bg-amber-50 rounded-xl">
                <p>まずは「教材管理」タブから学習する教材を登録してください。</p>
              </div>
            ) : (
              <select 
                value={selectedMaterialId} 
                onChange={(e) => setSelectedMaterialId(e.target.value)}
                disabled={isRunning}
                className="w-full p-3 mb-8 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all disabled:opacity-50"
              >
                <option value="">教材を選択してください...</option>
                {materials.map(m => (
                  <option key={m.id} value={m.id}>【{m.subject}】{m.name}</option>
                ))}
              </select>
            )}

            <div className="text-6xl md:text-8xl font-black text-slate-800 tracking-wider font-mono my-8">
              {formatTime(time)}
            </div>

            <div className="flex justify-center gap-4">
              <button 
                onClick={handleStartPause}
                disabled={materials.length === 0}
                className={`w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center text-white shadow-lg transition-transform hover:scale-105 active:scale-95 ${
                  isRunning ? 'bg-amber-500 hover:bg-amber-600' : 'bg-indigo-600 hover:bg-indigo-700'
                } disabled:opacity-50 disabled:hover:scale-100`}
              >
                <Icon name={isRunning ? "pause" : "play"} size={32} />
              </button>
              
              <button 
                onClick={handleStop}
                disabled={time === 0}
                className="w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center bg-rose-500 text-white shadow-lg hover:bg-rose-600 transition-transform hover:scale-105 active:scale-95 disabled:opacity-50 disabled:hover:scale-100"
              >
                <Icon name="square" size={24} />
              </button>
            </div>
          </div>
        </div>
      );
    }

    // --- 教材管理コンポーネント ---
    function MaterialsManager({ materials, setMaterials }) {
      const [newMaterial, setNewMaterial] = useState('');
      const [newSubject, setNewSubject] = useState(SUBJECTS[0]);

      const handleAdd = (e) => {
        e.preventDefault();
        if (!newMaterial.trim()) return;
        
        const material = {
          id: Date.now().toString(),
          name: newMaterial.trim(),
          subject: newSubject
        };
        setMaterials([...materials, material]);
        setNewMaterial('');
      };

      const handleDelete = (id) => {
        if(confirm('この教材を削除しますか？\n（学習履歴は残りますが、教材名が不明になります）')) {
          setMaterials(materials.filter(m => m.id !== id));
        }
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-300">
          <h2 className="text-2xl font-bold text-slate-800">教材の登録・管理</h2>

          <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h3 className="text-lg font-bold text-slate-800 mb-4">新しい教材を追加</h3>
            <form onSubmit={handleAdd} className="flex flex-col md:flex-row gap-3">
              <select 
                value={newSubject}
                onChange={(e) => setNewSubject(e.target.value)}
                className="p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
              >
                {SUBJECTS.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
              <input 
                type="text" 
                placeholder="教材名（例：青チャート、英単語ターゲット...）"
                value={newMaterial}
                onChange={(e) => setNewMaterial(e.target.value)}
                className="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
              />
              <button 
                type="submit"
                className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-medium hover:bg-indigo-700 transition-colors whitespace-nowrap"
              >
                追加する
              </button>
            </form>
          </div>

          <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h3 className="text-lg font-bold text-slate-800 mb-4">登録済みの教材リスト</h3>
            {materials.length === 0 ? (
              <p className="text-slate-400 text-center py-4">まだ教材が登録されていません。</p>
            ) : (
              <ul className="space-y-3">
                {materials.map(material => (
                  <li key={material.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <div className="flex items-center gap-3">
                      <span 
                        className="px-3 py-1 rounded-full text-xs font-bold text-white"
                        style={{ backgroundColor: SUBJECT_COLORS[material.subject] || SUBJECT_COLORS['その他'] }}
                      >
                        {material.subject}
                      </span>
                      <span className="font-medium text-slate-700">{material.name}</span>
                    </div>
                    <button 
                      onClick={() => handleDelete(material.id)}
                      className="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors"
                    >
                      <Icon name="trash-2" size={20} />
                    </button>
                  </li>
                ))}
              </ul>
            )}
          </div>
        </div>
      );
    }

    // --- 学習履歴コンポーネント ---
    function RecordsList({ records, materials, setRecords }) {
      const formatDuration = (seconds) => {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        if (h > 0) return `${h}時間 ${m}分`;
        return `${m}分`;
      };

      const handleDelete = (id) => {
        if(confirm('この学習記録を削除しますか？')) {
          setRecords(records.filter(r => r.id !== id));
        }
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-300">
          <h2 className="text-2xl font-bold text-slate-800">学習履歴</h2>
          
          <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            {records.length === 0 ? (
              <p className="text-slate-400 text-center py-8">学習記録がありません。</p>
            ) : (
              <div className="space-y-4">
                {records.map(record => {
                  const material = materials.find(m => m.id === record.materialId);
                  const subjectName = material ? material.subject : '削除された教材';
                  const materialName = material ? material.name : '不明';
                  const dateObj = new Date(record.date);
                  
                  return (
                    <div key={record.id} className="flex flex-col md:flex-row md:items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100 gap-4">
                      <div className="flex flex-col gap-1">
                        <span className="text-sm text-slate-500">
                          {dateObj.toLocaleDateString('ja-JP')} {dateObj.toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'})}
                        </span>
                        <div className="flex items-center gap-2">
                          <span 
                            className="px-2 py-0.5 rounded text-xs font-bold text-white"
                            style={{ backgroundColor: SUBJECT_COLORS[subjectName] || SUBJECT_COLORS['その他'] }}
                          >
                            {subjectName}
                          </span>
                          <span className="font-semibold text-slate-700">{materialName}</span>
                        </div>
                      </div>
                      
                      <div className="flex items-center justify-between md:justify-end gap-4">
                        <span className="text-lg font-bold text-indigo-600">
                          {formatDuration(record.durationSeconds)}
                        </span>
                        <button 
                          onClick={() => handleDelete(record.id)}
                          className="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors"
                        >
                          <Icon name="trash-2" size={20} />
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
